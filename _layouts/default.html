<!DOCTYPE html>
<html lang="{{ page.lang }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
{% if page.og_description %}
<meta name="description" content="{{ page.og_description }}" />
{% endif %}
<link rel="image_src" href="https://smokefreens.github.io/ogimage.jpg" />

{% if page.og_title %}
<meta property="og:title" content="{{ page.og_title }}">
{% else %}
<meta property="og:title" content="{{ page.title }}">
{% endif %}
<meta property="og:type" content="article">
<meta property="og:image" content="https://smokefreens.github.io/ogimage.jpg">
{% if page.og_description %}
<meta property="og:description" content="{{ page.og_description }}">
{% endif %}

<meta name="twitter:card" content="summary">
{% if page.og_title %}
<meta name="twitter:title" content="{{ page.og_title }}">
{% else %}
<meta property="og:title" content="{{ page.title }}">
{% endif %}
{% if page.og_description %}
<meta name="twitter:description" content="{{ page.og_description }}">
{% endif %}
<meta name="twitter:image" content="https://smokefreens.github.io/ogimage.jpg">

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
	.container {
	  width: auto;
	  max-width: 680px;
	  padding: 0 15px;
	}
    #map {
      height: calc(100% - 56px); /* Subtract the height of the navbar */
    }
	img.leaflet-checked-point { filter: hue-rotate(240deg); }
  </style>
</head>

</html>
